<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Work From Home</title>
    <style>
        body{
            margin:0;
            padding:0;
            background:#0f172a;
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }
        .box{
            background:#020617;
            border:2px solid #22c55e;
            padding:25px;
            max-width:420px;
            text-align:center;
            border-radius:12px;
            box-shadow:0 0 20px rgba(34,197,94,0.4);
        }
        h1{
            color:#22c55e;
            font-size:22px;
            margin-bottom:15px;
        }
        p{
            font-size:15px;
            line-height:1.6;
        }
        .income{
            color:#facc15;
            font-weight:bold;
            margin:15px 0;
            font-size:16px;
        }
        a{
            display:inline-block;
            margin-top:15px;
            padding:12px 22px;
            background:#22c55e;
            color:black;
            text-decoration:none;
            font-weight:bold;
            border-radius:30px;
        }
        .alert{
            margin-top:15px;
            color:#f87171;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>*ONLINE WORK FROM HOME* 📲</h1>

    <p>
        Freshers and Non experienced can also Apply!! 📝  
        <br><b>(Age Must be 18+)</b>
    </p>

    <div class="income">
        Income Potential – 15-20k per month 💸
    </div>

    <p><b>Apply Now 👇👇</b></p>

    <a href="https://rb.gy/sbzzh8" target="_blank">
        Apply Here
    </a>

    <div class="alert">
        ‼ Only 10 vacancies available ‼
    </div>
</div>

</body>
</html>
